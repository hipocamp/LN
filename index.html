<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estimació Numèrica - NeurekaLAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-container { touch-action: none; position: relative; height: 100px; display: flex; align-items: center; }
        .main-line { height: 4px; width: 100%; background-color: #334155; border-radius: 2px; }
        .tick { position: absolute; width: 2px; height: 24px; background-color: #334155; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col overflow-hidden">

    <div class="max-w-md mx-auto w-full flex-grow flex flex-col p-6">
        
        <!-- 1. PANTALLA INICIAL -->
        <div id="pantalla-inici" class="flex-grow flex flex-col justify-center text-center fade-in">
            <h1 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-8">NeurekaLAB - Recerca</h1>
            <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
                <p class="text-lg font-medium leading-relaxed mb-8">
                    Veuràs una línia en blanc, entre el 0 i el 100. <br><br>
                    Has de posicionar el nombre que veus en aquesta línia, tan bé i ràpid com puguis. <br><br>
                    Comencem?
                </p>
                <button onclick="comencarProva()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform uppercase italic">
                    Endavant
                </button>
            </div>
        </div>

        <!-- 2. PANTALLA DE JOC (SENSE FEEDBACK) -->
        <div id="pantalla-joc" class="hidden flex-grow flex flex-col fade-in">
            <header class="text-center pt-10">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Ubica el número:</p>
                <div class="h-24 flex items-center justify-center">
                    <span id="target-number" class="text-7xl font-black text-slate-900 leading-none tracking-tighter">--</span>
                </div>
            </header>

            <main class="flex-grow flex flex-col justify-center px-4">
                <div class="relative">
                    <div class="flex justify-between mb-4 text-lg font-black text-slate-400 italic">
                        <span>0</span>
                        <span>100</span>
                    </div>
                    <div id="click-area" class="line-container cursor-pointer">
                        <div class="main-line"></div>
                        <div class="tick left-0"></div>
                        <div class="tick right-0"></div>
                    </div>
                </div>
            </main>
        </div>

        <!-- 3. PANTALLA DE RESULTATS -->
        <div id="pantalla-final" class="hidden flex-grow flex flex-col justify-center text-center fade-in">
            <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
                <h2 class="text-2xl font-black text-slate-800 mb-2">Prova finalitzada</h2>
                <p class="text-sm text-slate-500 mb-8 font-medium italic">Gràcies per la teva col·laboració.</p>
                
                <div class="space-y-3">
                    <button onclick="downloadCSV()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                        Descarregar Dades (.csv)
                    </button>
                    <button onclick="sendEmail(
