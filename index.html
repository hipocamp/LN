<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quixot Evolution - NeurekaLAB</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/512/8b4513/don-quixote.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/8b4513/don-quixote.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e293b">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #fef3c7; font-family: sans-serif; }
        #joc-container { position: relative; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        
        header { 
            height: 60px; background: #1e293b; color: white; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 20px; 
            box-sizing: border-box; z-index: 10; border-bottom: 3px solid #8b4513;
        }
        .stat-label { font-size: 8px; text-transform: uppercase; color: #94a3b8; font-weight: 800; letter-spacing: 1px; }
        .stat-val { font-size: 20px; font-weight: 900; color: #facc15; }
        #nivell-tag { background: #dc2626; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        canvas { background-color: #bae6fd; flex-grow: 1; touch-action: none; }

        /* AVIS D'ORIENTACIÓ */
        #orientation-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: #1e293b;
            color: white;
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .phone-icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: rotatePhone 2s infinite;
        }
        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        /* Detectar si està en vertical en mòbils/tablets */
        @media (orientation: portrait) {
            #orientation-warning { display: flex; }
        }

        #game-over { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); 
            color: white; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; text-align: center; backdrop-filter: blur(10px);
        }
        .btn-restart { 
            background: #2563eb; color: white; border: none; padding: 18px 45px; 
            border-radius: 50px; font-weight: 900; font-size: 18px; cursor: pointer; 
            margin-top: 25px; box-shadow: 0 8px 0 #1e40af;
        }

        footer { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 9px; color: #64748b; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <!-- MISSATGE PER GIRAR EL MÒBIL -->
    <div id="orientation-warning">
        <div class="phone-icon">📱🔄</div>
        <h2 style="font-style: italic;">GIRA EL DISPOSITIU</h2>
        <p style="color: #94a3b8; font-size: 14px;">Per poder lluitar contra els molins, has de posar la pantalla en <b>horitzontal</b>.</p>
    </div>

    <div id="joc-container">
        <header>
            <div class="text-left">
                <p class="stat-label">Punts</p>
                <span id="val-punts" class="stat-val">0</span>
            </div>
            <div class="text-center">
                <div id="val-vides" style="font-size: 20px;">❤️❤️❤️</div>
                <div id="nivell-tag">NIVELL 1</div>
            </div>
            <div style="text-align: right;">
                <p class="stat-label">Rècord</p>
                <span id="val-record" class="stat-val">0</span>
            </div>
        </header>

        <canvas id="jocCanvas"></canvas>

        <div id="game-over">
            <h2 style="font-size: 32px; font-weight: 900; font-style: italic; color: #f87171; margin: 0;">BATALLA ACABADA</h2>
            <div style="margin: 20px 0; border: 2px solid #334155; padding: 20px; border-radius: 30px; background: rgba(255,255,255,0.05); width: 180px;">
                <p id="punts-finals" style="font-size: 50px; font-weight: 900; margin: 0;">0</p>
                <p style="font-size: 10px; color: #94a3b8; font-weight: bold;">PUNTS</p>
            </div>
            <button onclick="reiniciar()" class="btn-restart">REINTENTAR</button>
        </div>

        <footer>By NeurekaLAB</footer>
    </div>

    <script>
        const canvas = document.getElementById("jocCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("game-over");

        let puntuacio = 0;
        let vides = 3;
        let jocActiu = true;
        let tempsInici = Date.now();
        let nivell = 1;
        let record = localStorage.getItem("quixot_progressive_record") || 0;
        document.getElementById("val-record").innerText = record;

        function ajustarMida() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 60;
        }
        window.addEventListener('resize', () => {
            ajustarMida();
            // Si canviem d'orientació, el joc ha de saber on és el Quixot ara
            quixot.y = canvas.height - 80;
        });
        ajustarMida();

        let spawnProb = 0.012; 
        let moliSpeedMin = 1.8;
        let moliSpeedMax = 3.5;

        const quixot = { x: canvas.width / 2 - 30, y: canvas.height - 80, w: 60, h: 60, isDragging: false };
        let llances = [];
        let molins = [];
        let angleAspes = 0;

        canvas.addEventListener('touchstart', (e) => {
            const touchY = e.touches[0].clientY;
            if (touchY > canvas.height * 0.5) {
                quixot.isDragging = true;
            }
            disparar();
        });

        canvas.addEventListener('touchmove', (e) => {
            if (quixot.isDragging && jocActiu) {
                const touchX = e.touches[0].clientX;
                quixot.x = touchX - quixot.w / 2;
                if (quixot.x < 0) quixot.x = 0;
                if (quixot.x > canvas.width - quixot.w) quixot.x = canvas.width - quixot.w;
            }
        });

        canvas.addEventListener('touchend', () => { quixot.isDragging = false; });
        canvas.addEventListener('mousedown', disparar);

        function disparar() {
            if (!jocActiu) return;
            llances.push({ x: quixot.x + 27, y: quixot.y, w: 5, h: 25 });
        }

        function dibuixarQuixot(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = "#5d4037";
            ctx.beginPath();
            ctx.roundRect(10, 35, 40, 20, 8); ctx.fill(); 
            ctx.fillRect(40, 22, 10, 18); 
            ctx.fillStyle = "#374151";
            ctx.fillRect(20, 12, 15, 25); 
            ctx.fillStyle = "#f3f4f6";
            ctx.beginPath();
            ctx.arc(27, 8, 8, 0, Math.PI * 2); ctx.fill(); 
            ctx.strokeStyle = "#94a3b8";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(35, 20); ctx.lineTo(55, -10); ctx.stroke();
            ctx.restore();
        }

        function dibuixarMoli(m) {
            ctx.save();
            ctx.translate(m.x + m.w/2, m.y + m.h/2);
            ctx.fillStyle = "#f8fafc";
            ctx.beginPath();
            ctx.moveTo(-10, 15); ctx.lineTo(10, 15); ctx.lineTo(8, -12); ctx.lineTo(-8, -12); ctx.fill();
            ctx.fillStyle = "#78350f";
            ctx.beginPath(); ctx.moveTo(-11, -12); ctx.lineTo(11, -12); ctx.lineTo(0, -20); ctx.fill();
            ctx.rotate(angleAspes);
            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 2.5;
            for(let i=0; i<4; i++) {
                ctx.rotate(Math.PI/2);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, 18); ctx.stroke();
                ctx.fillStyle = "rgba(255,255,255,0.7)";
                ctx.fillRect(-3, 8, 6, 10);
            }
            ctx.restore();
        }

        function actualitzarDificultat() {
            let tempsTranscorregut = (Date.now() - tempsInici) / 1000;
            let nouNivell = Math.floor(tempsTranscorregut / 30) + 1;
            if (nouNivell !== nivell) {
                nivell = nouNivell;
                document.getElementById("nivell-tag").innerText = "NIVELL " + nivell;
                spawnProb += 0.006;
                moliSpeedMin += 0.5;
                moliSpeedMax += 0.6;
            }
        }

        function perdreVida() {
            vides--;
            document.getElementById("val-vides").innerText = "❤️".repeat(vides);
            if (vides <= 0) finalitzarJoc();
        }

        function finalitzarJoc() {
            jocActiu = false;
            if (puntuacio > record) {
                record = puntuacio;
                localStorage.setItem("quixot_progressive_record", record);
            }
            document.getElementById("punts-finals").innerText = puntuacio;
            overlay.style.display = "flex";
        }

        function reiniciar() {
            puntuacio = 0; vides = 3; llances = []; molins = []; nivell = 1;
            tempsInici = Date.now();
            spawnProb = 0.012; moliSpeedMin = 1.8; moliSpeedMax = 3.5;
            document.getElementById("val-punts").innerText = "0";
            document.getElementById("val-vides").innerText = "❤️❤️❤️";
            document.getElementById("nivell-tag").innerText = "NIVELL 1";
            overlay.style.display = "none";
            jocActiu = true;
            bucle();
        }

        function bucle() {
            if (!jocActiu) return;
            actualitzarDificultat();
            quixot.y = canvas.height - 80;
            angleAspes += 0.03 + (nivell * 0.01);

            if (Math.random() < spawnProb) {
                molins.push({ x: Math.random() * (canvas.width - 25), y: -50, w: 25, h: 40, v: moliSpeedMin + Math.random() * (moliSpeedMax - moliSpeedMin) });
            }

            llances.forEach((l, i) => {
                l.y -= 10;
                if (l.y < -50) llances.splice(i, 1);
            });

            molins.forEach((m, i) => {
                m.y += m.v;
                if (m.y > canvas.height) molins.splice(i, 1);
                if (m.y + m.h > quixot.y + 15 && m.x < quixot.x + quixot.w - 10 && m.x + m.w > quixot.x + 10) {
                    molins.splice(i, 1); perdreVida();
                }
                llances.forEach((l, li) => {
                    if (l.x < m.x + m.w && l.x + l.w > m.x && l.y < m.y + m.h && l.y + l.h > m.y) {
                        molins.splice(i, 1); llances.splice(li, 1);
                        puntuacio += 5; document.getElementById("val-punts").innerText = puntuacio;
                    }
                });
            });

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#a16207";
            ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
            dibuixarQuixot(quixot.x, quixot.y);
            ctx.fillStyle = "#ef4444";
            llances.forEach(l => { ctx.beginPath(); ctx.roundRect(l.x, l.y, l.w, l.h, 2); ctx.fill(); });
            molins.forEach(m => dibuixarMoli(m));
            requestAnimationFrame(bucle);
        }

        bucle();
    </script>
</body>
</html>
