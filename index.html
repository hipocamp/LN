<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeurekaLAB</title>
    <style>
        /* CSS PUR - Sense dependre de Tailwind */
        body { font-family: -apple-system, sans-serif; background-color: #f8fafc; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #pantalla-inici, #pantalla-joc, #pantalla-final { display: none; flex-direction: column; flex-grow: 1; padding: 20px; text-align: center; justify-content: center; }
        
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .titol { font-size: 10px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }
        
        button { background-color: #2563eb; color: white; border: none; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        button:active { transform: scale(0.98); background-color: #1d4ed8; }

        .numero-gran { font-size: 90px; font-weight: 900; color: #0f172a; margin: 0; }
        
        .line-container { position: relative; width: 100%; height: 150px; display: flex; align-items: center; cursor: crosshair; touch-action: none; margin-top: 20px; }
        .main-line { height: 4px; width: 100%; background: #334155; border-radius: 2px; }
        .tick { position: absolute; width: 2px; height: 30px; background: #334155; }
        .labels { display: flex; justify-content: space-between; font-weight: 900; font-size: 24px; color: #cbd5e1; font-style: italic; }

        #btn-final { background-color: #1e293b; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- 1. PANTALLA INICI -->
    <div id="pantalla-inici" style="display: flex;">
        <div class="titol">NeurekaLAB</div>
        <div class="card">
            <p style="font-size: 18px; text-align: left; line-height: 1.6; color: #334155;">
                Veuràs una línia en blanc, entre el 0 i el 100.<br><br>
                Has de posicionar el nombre que veus en aquesta línia, tan bé i ràpid com puguis.<br><br>
                Comencem?
            </p>
            <button onclick="comencar()">Endavant</button>
        </div>
    </div>

    <!-- 2. PANTALLA JOC -->
    <div id="pantalla-joc">
        <p style="font-size: 10px; font-weight: bold; color: #94a3b8; text-transform: uppercase;">Ubica el número:</p>
        <h1 id="target-number" class="numero-gran">--</h1>
        
        <div style="margin-top: 50px;">
            <div class="labels"><span>0</span><span>100</span></div>
            <div id="click-area" class="line-container">
                <div class="main-line"></div>
                <div class="tick" style="left: 0;"></div>
                <div class="tick" style="right: 0;"></div>
            </div>
        </div>
    </div>

    <!-- 3. PANTALLA FINAL -->
    <div id="pantalla-final">
        <div class="card">
            <h2 style="font-weight: 900; font-style: italic; text-transform: uppercase;">Prova finalitzada</h2>
            <p style="color: #64748b; margin-bottom: 30px;">Les dades s'han registrat correctament.</p>
            <button onclick="descarregar()">Descarregar CSV</button>
            <button id="btn-final" onclick="enviarEmail()">Enviar per Email</button>
        </div>
    </div>

    <script>
        let trials = [];
        let currentIdx = 0;
        let results = [];
        let startTime = 0;

        function generarNumbers() {
            let n = [];
            for(let i=0; i<10; i++){
                let min = (i*10); let max = (i*10)+9;
                if(min===0) min=1; if(max>=100) max=99;
                n.push(Math.floor(Math.random() * (max - min + 1)) + min);
            }
            return n.sort(() => Math.random() - 0.5);
        }

        function comencar() {
            document.getElementById('pantalla-inici').style.display = 'none';
            document.getElementById('pantalla-joc').style.display = 'flex';
            trials = generarNumbers();
            currentIdx = 0;
            results = [];
            següent();
        }

        function següent() {
            if (currentIdx >= trials.length) {
                finalitzar();
                return;
            }
            document.getElementById('target-number').innerText = trials[currentIdx];
            startTime = Date.now();
        }

        document.getElementById('click-area').addEventListener('mousedown', tractarClic);
        document.getElementById('click-area').addEventListener('touchstart', function(e) {
            e.preventDefault();
            tractarClic(e.touches[0]);
        });

        function tractarClic(e) {
            if (document.getElementById('pantalla-joc').style.display !== 'flex') return;
            
            let temps = Date.now() - startTime;
            let rect = document.getElementById('click-area').getBoundingClientRect();
            let x = e.clientX - rect.left;
            let percent = Math.max(0, Math.min(1, x / rect.width));
            let guess = Math.round(percent * 100);
            let target = trials[currentIdx];

            results.push({
                intent: currentIdx + 1,
                target: target,
                resposta: guess,
                error: Math.abs(target - guess),
                temps: temps
            });

            currentIdx++;
            següent();
        }

        function finalitzar() {
            document.getElementById('pantalla-joc').style.display = 'none';
            document.getElementById('pantalla-final').style.display = 'flex';
        }

        function getCSV() {
            let csv = "Intent;Numero;Resposta;Error;Temps_ms\n";
            results.forEach(r => {
                csv += r.intent + ";" + r.target + ";" + r.resposta + ";" + r.error + ";" + r.temps + "\n";
            });
            return csv;
        }

        function descarregar() {
            let blob = new Blob([getCSV()], {type: 'text/csv'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "resultats.csv";
            a.click();
        }

        function enviarEmail() {
            let subject = encodeURIComponent("Resultats Estimació");
            let body = encodeURIComponent(getCSV());
            window.location.href = "mailto:exemple@neurekalab.com?subject=" + subject + "&body=" + body;
        }
    </script>
</body>
</html>
