<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeurekaLAB - Recerca</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f8fafc; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: #1e293b; }
        #pantalla-inici, #pantalla-perfil, #pantalla-joc, #pantalla-final { display: none; flex-direction: column; flex-grow: 1; padding: 20px; text-align: center; justify-content: center; overflow-y: auto; }
        
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; max-width: 420px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .titol-sup { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
        
        /* Formularis */
        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 6px; display: block; margin-left: 5px; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #f1f5f9; background: #f8fafc; font-size: 14px; outline: none; box-sizing: border-box; }
        
        .selector-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 5px; }
        .option-btn { background: #f1f5f9; border: 2px solid #e2e8f0; padding: 10px 5px; border-radius: 12px; cursor: pointer; font-size: 10px; font-weight: bold; transition: all 0.2s; text-align: center; }
        .option-btn.active { background: #dbeafe; border-color: #2563eb; color: #2563eb; transform: scale(1.03); }

        .btn-principal { background-color: #cbd5e1; color: white; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 900; width: 100%; cursor: not-allowed; text-transform: uppercase; margin-top: 10px; }
        .btn-principal.ready { background-color: #2563eb; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        
        /* Joc - Línia al 85% fixa */
        .game-header { height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .instruccio-titol { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .numero-gran { font-size: 110px; font-weight: 900; color: #0f172a; margin: 0; letter-spacing: -5px; line-height: 1; }
        
        /* Contenidor de la línia fix al 85% */
        .line-wrapper { width: 85%; margin: 0 auto; position: relative; }
        .line-container { position: relative; width: 100%; height: 160px; display: flex; align-items: center; cursor: crosshair; touch-action: none; }
        .main-line { height: 5px; width: 100%; background: #334155; border-radius: 3px; }
        .tick { position: absolute; width: 2px; height: 35px; background: #334155; }
        .labels { display: flex; justify-content: space-between; font-weight: 900; font-size: 32px; color: #cbd5e1; font-style: italic; margin-bottom: -20px; }

        .btn-final { background-color: #1e293b; margin-top: 10px; padding: 16px; border-radius: 14px; color: white; width: 100%; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

    <!-- 1. PANTALLA INICI -->
    <div id="pantalla-inici" style="display: flex;">
        <div class="titol-sup">NeurekaLAB</div>
        <div class="card">
            <p style="font-size: 18px; text-align: left; line-height: 1.6; color: #334155; margin-bottom: 30px;">
                Veuràs una línia en blanc, entre el 0 i el 100.<br><br>
                Has de posicionar el nombre que veus en aquesta línia, tan bé i ràpid com puguis.
            </p>
            <button class="btn-principal ready" onclick="anarAPerfil()">Endavant</button>
        </div>
    </div>

    <!-- 2. PANTALLA PERFIL -->
    <div id="pantalla-perfil">
        <div class="titol-sup">Perfil de l'usuari</div>
        <div class="card">
            <div class="form-group">
                <label>Sexe</label>
                <div class="selector-group" style="grid-template-columns: 1fr 1fr;">
                    <div class="option-btn sexe-opt" onclick="selectSexe(this, 'Masculi')">Masculí</div>
                    <div class="option-btn sexe-opt" onclick="selectSexe(this, 'Femeni')">Femení</div>
                </div>
            </div>
            <div class="form-group">
                <label>Data de naixement</label>
                <input type="date" id="input-naixement" onchange="validarForm()">
            </div>
            <div class="form-group">
                <label>Nivell d'estudis</label>
                <select id="input-estudis" onchange="validarForm()">
                    <option value="">Selecciona...</option>
                    <option value="1r ESO">1r ESO</option>
                    <option value="2n ESO">2n ESO</option>
                    <option value="3r ESO">3r ESO</option>
                    <option value="4t ESO">4t ESO</option>
                    <option value="1r Batxillerat">1r Batxillerat</option>
                    <option value="2n Batxillerat">2n Batxillerat</option>
                    <option value="1r Grau Mig">1r Grau Mig</option>
                    <option value="2n Grau Mig">2n Grau Mig</option>
                    <option value="Universitari">Estudiant universitari</option>
                    <option value="Grau Superior">Estudiant grau superior</option>
                    <option value="Graduat">Graduat</option>
                </select>
            </div>
            <div class="form-group">
                <label>Dispositiu</label>
                <div class="selector-group">
                    <div class="option-btn disp-opt" onclick="selectDisp(this, 'Mobil')">📱 Mòbil</div>
                    <div class="option-btn disp-opt" onclick="selectDisp(this, 'Tablet')">📟 Tablet</div>
                    <div class="option-btn disp-opt" onclick="selectDisp(this, 'PC')">💻 PC</div>
                </div>
            </div>
            <button id="btn-comencar" class="btn-principal" onclick="comencarProva()" disabled>Començar</button>
        </div>
    </div>

    <!-- 3. PANTALLA JOC -->
    <div id="pantalla-joc">
        <div id="estimul-container" class="game-header">
            <p id="label-ubica" class="instruccio-titol">Ubica el número:</p>
            <h1 id="target-number" class="numero-gran">--</h1>
        </div>
        
        <div id="area-estimacio" class="line-wrapper">
            <div class="labels"><span>0</span><span>100</span></div>
            <div id="click-area" class="line-container">
                <div class="main-line"></div>
                <div class="tick" style="left: 0;"></div>
                <div class="tick" style="right: 0;"></div>
            </div>
        </div>
    </div>

    <!-- 4. PANTALLA FINAL -->
    <div id="pantalla-final">
        <div class="card">
            <h2 style="font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 5px;">Prova finalitzada</h2>
            <p style="color: #64748b; font-size: 13px; margin-bottom: 30px;">Dades registrades correctament.</p>
            <button class="btn-final" style="background-color: #2563eb;" onclick="descarregarCSV()">Descarregar CSV</button>
            <button class="btn-final" onclick="enviarEmail()">Enviar per Email</button>
        </div>
    </div>

    <script>
        let trials = [];
        let currentIdx = 0;
        let results = [];
        let startTime = 0;
        let userSexe = "";
        let userDisp = "";
        let interactuable = false;

        function anarAPerfil() {
            document.getElementById('pantalla-inici').style.display = 'none';
            document.getElementById('pantalla-perfil').style.display = 'flex';
        }

        function selectSexe(el, val) {
            document.querySelectorAll('.sexe-opt').forEach(b => b.classList.remove('active'));
            el.classList.add('active'); userSexe = val; validarForm();
        }

        function selectDisp(el, val) {
            document.querySelectorAll('.disp-opt').forEach(b => b.classList.remove('active'));
            el.classList.add('active'); userDisp = val; validarForm();
        }

        function validarForm() {
            const naix = document.getElementById('input-naixement').value;
            const est = document.getElementById('input-estudis').value;
            const btn = document.getElementById('btn-comencar');
            if (userSexe && userDisp && naix && est) {
                btn.disabled = false; btn.classList.add('ready');
            } else {
                btn.disabled = true; btn.classList.remove('ready');
            }
        }

        function generarNumbers() {
            let n = [];
            for(let i=0; i<10; i++){
                let min = i*10; let max = (i+1)*10 - 1;
                if(min === 0) min = 1; if(max >= 100) max = 99;
                n.push(Math.floor(Math.random() * (max - min + 1)) + min);
            }
            return n.sort(() => Math.random() - 0.5);
        }

        function comencarProva() {
            document.getElementById('pantalla-perfil').style.display = 'none';
            document.getElementById('pantalla-joc').style.display = 'flex';
            trials = generarNumbers();
            currentIdx = 0;
            results = [];
            
            // La línia és visible SEMPRE dins de pantalla-joc
            carregarNouNumero();
        }

        function carregarNouNumero() {
            if (currentIdx >= trials.length) {
                finalitzar();
                return;
            }
            
            // Posem el número i el fem visible
            document.getElementById('target-number').innerText = trials[currentIdx];
            document.getElementById('estimul-container').style.visibility = 'visible';
            
            startTime = performance.now();
            interactuable = true;
        }

        const area = document.getElementById('click-area');
        area.addEventListener('mousedown', tractarClic);
        area.addEventListener('touchstart', (e) => { e.preventDefault(); tractarClic(e.touches[0]); });

        function tractarClic(e) {
            if (!interactuable) return;
            interactuable = false;
            
            const tempsMs = Math.round(performance.now() - startTime);
            const rect = area.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = Math.max(0, Math.min(1, x / rect.width));
            const guess = Math.round(percent * 100);
            const target = trials[currentIdx];

            // Guardar dades
            results.push({
                intent: currentIdx + 1,
                sexe: userSexe,
                naixement: document.getElementById('input-naixement').value,
                estudis: document.getElementById('input-estudis').value,
                dispositiu: userDisp,
                target: target,
                resposta: guess,
                error: Math.abs(target - guess),
                temps: tempsMs
            });

            // AMAGUEM NOMÉS EL CONTENIDOR DE L'ESTÍMUL (Número i text)
            // La línia (area-estimacio) NO es toca, segueix visible.
            document.getElementById('estimul-container').style.visibility = 'hidden';

            currentIdx++;
            
            // Pausa de 2 segons mantenint la línia a la vista
            setTimeout(() => {
                carregarNouNumero();
            }, 2000);
        }

        function finalitzar() {
            document.getElementById('pantalla-joc').style.display = 'none';
            document.getElementById('pantalla-final').style.display = 'flex';
        }

        function getCSV() {
            let csv = "Intent;Sexe;Data_Naixement;Estudis;Dispositiu;Numero_Demanat;Resposta_Usuari;Error_Absolut;Temps_Reaccio_ms\n";
            results.forEach(r => {
                csv += `${r.intent};${r.sexe};${r.naixement};${r.estudis};${r.dispositiu};${r.target};${r.resposta};${r.error};${r.temps}\n`;
            });
            return csv;
        }

        function descarregarCSV() {
            const blob = new Blob([getCSV()], {type: 'text/csv;charset=utf-8;'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `resultats_neurekalab_${new Date().getTime()}.csv`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function enviarEmail() {
            const email = "neurekalab@exemple.com"; 
            const subject = encodeURIComponent("Dades Investigació NeurekaLAB");
            const body = encodeURIComponent("Dades de la sessió:\n\n" + getCSV());
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
